name: flutter_turbo_packages
publish_to: none

environment:
  sdk: ^3.9.0

workspace:
  - turbo_firestore_api
  - turbo_forms
  - turbo_mvvm
  - turbo_notifiers
  - turbo_response
  - turbo_responsiveness
  - turbo_routing
  - turbo_widgets
  - turbolytics
  - turbo_templates/turbo_flutter_template

dev_dependencies:
  melos: ^7.0.0

melos:
  scripts:
    test:
      description: Run tests in all packages
      run: flutter test
      exec:
        concurrency: 1

    analyze:
      description: Analyze all packages
      run: dart analyze lib/
      exec:
        concurrency: 1

    format:
      description: Format all packages
      run: |
        if [ -d "example/lib" ]; then
          dart format lib/ test/ example/lib/
        else
          dart format lib/ test/
        fi
      exec:
        concurrency: 1

    format:check:
      description: Check formatting without modifying files
      run: |
        if [ -d "example/lib" ]; then
          dart format --set-exit-if-changed lib/ test/ example/lib/
        else
          dart format --set-exit-if-changed lib/ test/
        fi
      exec:
        concurrency: 1

    clean:
      description: Clean build artifacts
      run: flutter clean
      exec:
        concurrency: 1

    get:
      description: Get dependencies for all packages
      run: flutter pub get
      exec:
        concurrency: 1

